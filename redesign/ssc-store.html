<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seal Stone Chaos Store</title>
    <meta name="description" content="Tools and calculators for Top War players.">

    <meta property="og:title" content="Mathom House • Seal Stone Chaos Store">
    <meta property="og:description" content="Add up what you want!">
    <meta property="og:url" content="https://mathomhouse.github.io/ssc-store.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="From Artu and Gikey">
    <meta property="og:image" content="https://mathomhouse.github.io/images/sscstore-icon.png">
  <!-- Anti-flash -->
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/redesign/styles/mathomhouse.css">
  <link rel="stylesheet" href="/redesign/styles/header.css">
  <link rel="stylesheet" href="/redesign/styles/layout.css">
  <link rel="stylesheet" href="/redesign/styles/store.css">
  <script src="/redesign/header.js" defer></script>
</head>
<body>
    <header id="header-placeholder"></header>
  <h1 style="text-align:center">Seal Stone Chaos Store</h1>
  <div class="store-grid" id="storeContainer"></div>

  <button class="cart-button" onclick="toggleCart()">🛒 Cart</button>

  <div class="cart-panel" id="cartPanel">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <hr />
    <label>Your Badges: <input type="number" id="availablePoints" value="0" /></label>
    <p id="cartTotal"></p>
    <button onclick="updateCart()">Update Cart</button>
    <button onclick="clearCart()">Clear Cart</button>
    <button onclick="toggleCart()">Close</button>
  </div>

  <script>
    const items = [
      {name: "Orange Universal Shards", price: 1400, maxQty: 50},
      {name: "Orange Universal Shards", price: 1800, maxQty: 50},
      {name: "Orange Universal Shards", price: 2400, maxQty: 50},
      {name: "Universal Exclusive Skill Shards x5", price: 600, maxQty: 25},
      {name: "Universal Exclusive Skill Shards x5", price: 900, maxQty: 25},
      {name: "Universal Exclusive Skill Shards x5", price: 1200, maxQty: 25},
      {name: "Universal Decor Shards x5", price: 600, maxQty: 25},
      {name: "Universal Decor Shards x5", price: 900, maxQty: 25},
      {name: "Universal Decor Shards x5", price: 1200, maxQty: 25},
      {name: "Legendary Beast Chest", price: 24000, maxQty: 4},
      {name: "Epic Beast Chest", price: 4200, maxQty: 15},
      {name: "Ultra Enigma Crystal (Whole) x5", price: 2100, maxQty: 15},
      {name: "Top-tier Catalyst", price: 20000, maxQty: 4},
      {name: "Advanced-tier Catalyst", price: 5000, maxQty: 15},
      {name: "Mid-tier Catalyst", price: 1000, maxQty: 30},
      {name: "Expert HT Chip Chest", price: 6500, maxQty: 15},
      {name: "Amazing HT Chip Chest", price: 1300, maxQty: 50},
      {name: "Power Core", price: 550, maxQty: 25},
      {name: "Universal Formation Upgrade Guide x5", price: 1400, maxQty: 30},
      {name: "Hologram Choice Chest", price: 700, maxQty: 80},
      {name: "Hologram Choice Chest", price: 1400, maxQty: 80},
      {name: "Mastery Research x5", price: 1200, maxQty: 40},
      {name: "Mastery Research x5", price: 2400, maxQty: 40},
      {name: "Titan Gear Random Material Box x5", price: 2500, maxQty: 200},
      {name: "Smug (Emoji)", price: 5000, maxQty: 1}
    ];

    const storeContainer = document.getElementById('storeContainer');
    const cartPanel = document.getElementById('cartPanel');
    const cartItemsContainer = document.getElementById('cartItems');
    const cart = {};

    function createStore() {
      storeContainer.innerHTML = '';
      items.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'store-tile';
          const currentQty = cart[idx] || 0;
          if (currentQty >= item.maxQty) div.classList.add('disabled');

        div.innerHTML = `
          <h3>${item.name}</h3>
          <p>Price: ${item.price} Badges</p>
          <p>Max Qty: ${item.maxQty}</p>
          <div class="slider-row">
            <button onclick="changeQty(${idx}, -1)">-</button>
            <input type="range" min="0" max="${item.maxQty}" value="0" id="slider-${idx}" onchange="syncInputs(${idx})">
            <button onclick="changeQty(${idx}, 1)">+</button>
          </div>
          <input type="number" min="0" max="${item.maxQty}" value="0" id="qty-${idx}" onchange="syncSlider(${idx})">
          <br><br>
          <button onclick="addToCart(${idx})">Add to Cart</button>
        `;
        storeContainer.appendChild(div);
      });
    }

    function syncInputs(idx) {
      document.getElementById(`qty-${idx}`).value = document.getElementById(`slider-${idx}`).value;
    }

    function syncSlider(idx) {
      const val = Math.min(items[idx].maxQty, Math.max(0, parseInt(document.getElementById(`qty-${idx}`).value)));
      document.getElementById(`qty-${idx}`).value = val;
      document.getElementById(`slider-${idx}`).value = val;
    }

    function changeQty(idx, delta) {
      const input = document.getElementById(`qty-${idx}`);
      let val = parseInt(input.value || 0) + delta;
      val = Math.max(0, Math.min(val, items[idx].maxQty));
      input.value = val;
      document.getElementById(`slider-${idx}`).value = val;
    }

    function addToCart(idx) {
      const qty = parseInt(document.getElementById(`qty-${idx}`).value);
      if (qty > 0) {
        const currentQty = cart[idx] || 0;
        const newQty = Math.min(currentQty + qty, items[idx].maxQty);
        cart[idx] = newQty;
        updateCart();
        createStore();
      }

    }

    function updateCart() {
      cartItemsContainer.innerHTML = '';
      let total = 0;

      for (const idx in cart) {
        const item = items[idx];
        const qty = cart[idx];
        const cost = item.price * qty;
        total += cost;

        const line = document.createElement('div');
        line.className = 'cart-line';
        line.innerHTML = `
          <span class="item-name">${item.name}</span>
          <input class="item-qty" type="number" min="0" max="${item.maxQty}" value="${qty}" onchange="editCart(${idx}, this.value)">
          <span class="item-remove" onclick="removeFromCart(${idx})">×</span>
          <span>${cost}</span>
        `;
        cartItemsContainer.appendChild(line);
      }

      const available = parseInt(document.getElementById('availablePoints').value) || 0;
      const remaining = available - total;
      document.getElementById('cartTotal').innerHTML = `Total: ${total} Badges<br>Remaining: ${remaining}`;
    }

    function editCart(idx, value) {
      const qty = Math.max(0, Math.min(parseInt(value) || 0, items[idx].maxQty));
      if (qty === 0) delete cart[idx];
      else cart[idx] = qty;
      updateCart();
      createStore();
    }

    function removeFromCart(idx) {
      delete cart[idx];
      updateCart();
      createStore();
    }

    function clearCart() {
      for (const key in cart) delete cart[key];
      updateCart();
      createStore();
    }

    function toggleCart() {
      cartPanel.classList.toggle('open');
    }

    createStore();
  </script>
<footer>&copy; 2025 Mathom House &middot; Not affiliated with Top War or Topjoy</footer>
<a href="#" class="back-top" id="backToTop" aria-label="Back to top">↑</a>
</body>
</html>
