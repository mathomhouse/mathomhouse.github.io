<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>EL Points Calculator</title>
  <!-- Anti-flash -->
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/mathomhouse.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/calculators.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="header.js" defer></script>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 20px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }

    th {
      background-color: #f4f4f4;
    }

    .server-name {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .server-label {
      font-weight: bold;
      font-size: 14px
    }

    .name-input,
    .points-input {
      width: 80px;
      margin-top: 4px;
    }

    .endtime-container {
      margin-bottom: 20px;
    }

    tr:nth-child(1) td {
      background-color: #f8e8e8;
    }

    tr:nth-child(2) td {
      background-color: #e8f8e8;
    }

    tr:nth-child(3) td {
      background-color: #e8e8f8;
    }

    tr:nth-child(4) td {
      background-color: #fff0e6;
    }

    tr:nth-child(5) td {
      background-color: #f0fff0;
    }

    tr:nth-child(6) td {
      background-color: #e6f0ff;
    }

    tr:nth-child(7) td {
      background-color: #f5f5dc;
    }

    tr:nth-child(8) td {
      background-color: #ffe6f0;
    }

    .container button {
      margin-bottom: 20px;
      padding: 6px 12px;
      font-size: 16px;
    }

    .chart-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: space-between;
    }

    .chart-box {
      flex: 1 1 300px;
      min-width: 300px;
    }

    canvas {
      width: 100%;
      height: auto;
    }
    /* Fix for table headers in light and dark themes */
  body[data-theme="dark"] th {
    background-color: var(--accent-color);
    color: #ffffff;
  }

  body:not([data-theme="dark"]) th {
    background-color: #f4f4f4;
    color: #000000;
  }
  </style>
</head>

<body>
  <header id="header-placeholder"></header>
  <div class="container">
    <h1>Server Honor Points Calculator</h1>
    <p class="calc-desc">Track building ownership and project total points for your Eden/Alliance grouping.</p>
    
    <div class="endtime-container">
        <label>End Time:</label>
        <input type="datetime-local" id="endTimeInput" onchange="calculatePoints()">
    </div>

    <div id="allianceContainer" class="alliance-grid"></div>

    <div class="actions-row">
        <button class="calc-btn add-btn" onclick="addAlliance()">+ Add Alliance</button>
        <button class="calc-btn reset-btn" onclick="resetAll()">Reset All</button>
    </div>

    <div class="chart-container">
        <div class="chart-box"><canvas id="hpmChart"></canvas></div>
        <div class="chart-box"><canvas id="projectionChart"></canvas></div>
    </div>
</div>
  </div>
  <script src="elpoints.js"></script>
<footer>&copy; 2025 Mathom House &middot; Not affiliated with TopWar</footer>
<a href="#" class="back-top" id="backToTop" aria-label="Back to top">↑</a>
</body>

</html>
