<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathom House • Runes Guide</title>
  <meta name="description" content="Tools and calculators for Top War players.">

        <meta property="og:title" content="Mathom House • Rune Guide">
        <meta property="og:description" content="Check out different rune loadouts!">
        <meta property="og:url" content="https://mathomhouse.github.io/guides/runes.html">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="From Artu, Gikey, and Bobgrif">
        <meta property="og:image" content="https://mathomhouse.github.io/images/bobgrif-icon.png">
  <!-- Anti-flash -->
  <script>(function () { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles/mathomhouse.css">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/calculators.css">
  <link rel="stylesheet" href="/styles/bobsrunes.css">
  <style>
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1em;
    }
    .tabs button {
      margin: 5px;
    }

    #recommendations label,
    #loadouts label { display: block; margin-bottom: 3px; }

    .gear-box .hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .gear-box .hero-head h2 { margin: 0; }
    .hero-portrait-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 50%;
    }
    /* spinning aura ring behind portrait — always spinning, brightens on hover */
    .hero-portrait-wrap::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0deg, var(--gold) 60deg, #fff 90deg, var(--gold) 120deg, transparent 200deg, var(--gold-dim) 300deg, transparent 360deg);
      opacity: .55;
      z-index: 0;
      transition: opacity .3s ease, filter .3s ease;
      animation: portraitSpin 3s linear infinite;
    }
    .gear-box:hover .hero-portrait-wrap::before {
      opacity: 1;
      filter: drop-shadow(0 0 8px var(--gold));
      animation-duration: 1.4s;
    }
    /* Pause portrait animations while the card is scrolled out of view */
    .gear-box:not(.in-view) .hero-portrait-wrap::before,
    .gear-box:not(.in-view) .hero-portrait { animation-play-state: paused; }
    /* Pause all portrait animations while the tab is backgrounded */
    .anims-paused .hero-portrait-wrap::before,
    .anims-paused .hero-portrait { animation-play-state: paused; }
    .hero-portrait {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--gold-dim);
      background: var(--surface);
      transition: transform .35s cubic-bezier(.2,.7,.2,1), border-color .35s, box-shadow .35s;
    }
    .gear-box:hover .hero-portrait {
      transform: scale(1.18);
      border-color: var(--gold);
      animation: portraitPulse 1.6s ease-in-out infinite;
    }
    @keyframes portraitSpin { to { transform: rotate(360deg); } }
    @keyframes portraitPulse {
      0%, 100% { box-shadow: 0 0 12px var(--gold-glow); transform: scale(1.18); }
      50%      { box-shadow: 0 0 30px var(--gold), 0 0 50px var(--gold-glow); transform: scale(1.24); }
    }

    /* Card layout — match guides/bobstitaneffects (bobsrunes.css #results / #comboResults) */
    #loadoutResults .gear-box { width: 300px; }

    #recResults {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    #recResults .gear-box {
      flex: 1 1 300px;
      max-width: 300px;
    }
    #recResults .gear-box:last-child {
      flex-basis: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    #recResults .gear-box:last-child .gear-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    @media (max-width: 768px) {
      #recResults { flex-direction: column; align-items: center; }
      #recResults .gear-box { max-width: 100%; }
    }

    /* Gold borders around rune + HT chip icons */
    #loadoutResults .gear-slot,
    #recResults .gear-slot {
      grid-template-rows: auto 84px auto;
      height: auto;
      row-gap: 8px;
    }
    .rune-icon {
      box-sizing: content-box;
      padding: 4px;
      border: 2px solid var(--gold);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 0 6px var(--gold-glow, rgba(255,200,80,.45)), inset 0 0 4px rgba(0,0,0,.4);
    }
    .chip-icon {
      box-sizing: content-box;
      padding: 3px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: var(--surface);
      box-shadow: 0 0 6px var(--gold-glow, rgba(255,200,80,.45)), inset 0 0 4px rgba(0,0,0,.4);
    }
    .mecha-icon {
      box-sizing: content-box;
      padding: 4px;
      border: 2px solid var(--gold);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 0 6px var(--gold-glow, rgba(255,200,80,.45)), inset 0 0 4px rgba(0,0,0,.4);
    }
    /* Top-align HT chip/mecha icons so a wrapped name pushes text down, not the icon up */
    #loadoutResults .ht-icon-row,
    #recResults .ht-icon-row {
      align-items: flex-start;
    }
    #loadoutResults .ht-icon-column,
    #recResults .ht-icon-column {
      justify-content: flex-start;
    }
    #loadoutResults .chip-name,
    #loadoutResults .ht-name,
    #recResults .chip-name,
    #recResults .ht-name {
      margin-top: 12px;
    }
  </style>
  <script src="/header.js" defer></script>
</head>

<body>
  <header id="header-placeholder"></header>

  <section class="page-hero">
    <p class="breadcrumb"><a href="/">Home</a> / <a href="/guides.html">Guides</a> / Bobgrif's Titan Effects</p>
    <h1>Bobgrif's Runes Recommendations</h1>
    <p>Titan gear rune setups and recommended marches. All data provided by Bobgrif.</p>
  </section>

  <div class="container">

    <div class="tabs">
      <button class="tab-button active" onclick="openTab('loadouts')">Loadouts</button>
      <button class="tab-button" onclick="openTab('recommendations')">Recommendations</button>
    </div>
    
    <!-- Loadouts Tab -->
    <div id="loadouts" class="tab-content active">
      <br>
      <label for="marchTypeMeta">March Type:</label>
      <select id="marchTypeMeta" onchange="updateLoadoutOptions()">
        <option value="" disabled selected>Select march type</option>
      </select><br>

      <label for="loadoutName">Loadout:</label>
      <select id="loadoutName" onchange="showLoadout()">
        <option value="" disabled selected>Select loadout</option>
      </select>

      <br>

      <div id="loadoutResults" class="gear-container" style="display: none;"></div>

    </div>

    <!-- Recommendations Tab -->
    <div id="recommendations" class="tab-content">
      <h2>Recommended Marches</h2>
      <p>Select your Skill Level and March Type to view recommended rune and Heavy Trooper combinations.</p>

      <label for="skillLevel">Skill Level:</label>
      <select id="skillLevel" onchange="updateRecMarchTypes()">
        <option value="" disabled selected>Select skill level</option>
        <option value="ES 5">ES 5</option>
        <option value="ES 7">ES 7</option>
      </select><br>

      <label for="recMarchType">March Type:</label>
      <select id="recMarchType" onchange="showRecommendedLoadout()">
        <option value="" disabled selected>Select march type</option>
      </select>

      <br>

      <div id="recResults" class="gear-container" style="display: none;"></div>

    </div>

  </div>

<script src="/scripts/runes.js"> </script>

</body>

</html>
