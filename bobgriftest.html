<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bobgrif's Titan Effects</title>
  <meta name="description" content="Tools and calculators for Top War players.">

        <meta property="og:title" content="Mathom House • Rune Guide">
        <meta property="og:description" content="Check out different rune loadouts!">
        <meta property="og:url" content="https://mathomhouse.github.io/bobgriftest.html">
        <meta property="og:type" content="website">
        <meta property="og:site_name" content="From Artu, Gikey, and Bobgrif">
        <meta property="og:image" content="https://mathomhouse.github.io/images/bobgrif-icon.png">
  <!-- Anti-flash -->
  <script>(function () { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles/mathomhouse.css">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/calculators.css">
  <link rel="stylesheet" href="/styles/bobsrunes.css">
  <style>
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1em;
    }
    .tabs button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 0;
      border: 2px solid transparent;
      background: var(--accent-color);
      color: white;
      margin: 5px;
      cursor: pointer;
      transition: var(--transition-speed);
    }
    .tabs button:hover,
    .tabs button.active {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    #recommendations label,
    #loadouts label { display: block; margin-bottom: 3px; }

    .gear-box .hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .gear-box .hero-head h2 { margin: 0; }
    .hero-portrait-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 50%;
    }
    /* spinning aura ring behind portrait — always spinning, brightens on hover */
    .hero-portrait-wrap::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 0deg, var(--gold) 60deg, #fff 90deg, var(--gold) 120deg, transparent 200deg, var(--gold-dim) 300deg, transparent 360deg);
      opacity: .55;
      z-index: 0;
      transition: opacity .3s ease, filter .3s ease;
      animation: portraitSpin 3s linear infinite;
    }
    .gear-box:hover .hero-portrait-wrap::before {
      opacity: 1;
      filter: drop-shadow(0 0 8px var(--gold));
      animation-duration: 1.4s;
    }
    /* Pause portrait animations while the card is scrolled out of view */
    .gear-box:not(.in-view) .hero-portrait-wrap::before,
    .gear-box:not(.in-view) .hero-portrait { animation-play-state: paused; }
    /* Pause all portrait animations while the tab is backgrounded */
    .anims-paused .hero-portrait-wrap::before,
    .anims-paused .hero-portrait { animation-play-state: paused; }
    .hero-portrait {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--gold-dim);
      background: var(--surface);
      transition: transform .35s cubic-bezier(.2,.7,.2,1), border-color .35s, box-shadow .35s;
    }
    .gear-box:hover .hero-portrait {
      transform: scale(1.18);
      border-color: var(--gold);
      animation: portraitPulse 1.6s ease-in-out infinite;
    }
    @keyframes portraitSpin { to { transform: rotate(360deg); } }
    @keyframes portraitPulse {
      0%, 100% { box-shadow: 0 0 12px var(--gold-glow); transform: scale(1.18); }
      50%      { box-shadow: 0 0 30px var(--gold), 0 0 50px var(--gold-glow); transform: scale(1.24); }
    }

    /* Card layout — match guides/bobstitaneffects (bobsrunes.css #results / #comboResults) */
    #loadoutResults .gear-box { width: 300px; }

    #recResults {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    #recResults .gear-box {
      flex: 1 1 300px;
      max-width: 300px;
    }
    #recResults .gear-box:last-child {
      flex-basis: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    #recResults .gear-box:last-child .gear-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    @media (max-width: 768px) {
      #recResults { flex-direction: column; align-items: center; }
      #recResults .gear-box { max-width: 100%; }
    }

    /* Gold borders around rune + HT chip icons */
    #loadoutResults .gear-slot,
    #recResults .gear-slot {
      grid-template-rows: auto 84px auto;
      height: auto;
      row-gap: 8px;
    }
    .rune-icon {
      box-sizing: content-box;
      padding: 4px;
      border: 2px solid var(--gold);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 0 6px var(--gold-glow, rgba(255,200,80,.45)), inset 0 0 4px rgba(0,0,0,.4);
    }
    .chip-icon {
      box-sizing: content-box;
      padding: 3px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: var(--surface);
      box-shadow: 0 0 6px var(--gold-glow, rgba(255,200,80,.45)), inset 0 0 4px rgba(0,0,0,.4);
    }
    .mecha-icon {
      box-sizing: content-box;
      padding: 4px;
      border: 2px solid var(--gold);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: 0 0 6px var(--gold-glow, rgba(255,200,80,.45)), inset 0 0 4px rgba(0,0,0,.4);
    }
    /* Bottom-align HT chip/mecha names and add same buffer as runes */
    #loadoutResults .ht-icon-row,
    #recResults .ht-icon-row {
      align-items: flex-end;
    }
    #loadoutResults .ht-icon-column,
    #recResults .ht-icon-column {
      justify-content: flex-end;
    }
    #loadoutResults .chip-name,
    #loadoutResults .ht-name,
    #recResults .chip-name,
    #recResults .ht-name {
      margin-top: 12px;
    }
  </style>
  <script src="/header.js" defer></script>
</head>

<body>
  <header id="header-placeholder"></header>

  <section class="page-hero">
    <p class="breadcrumb"><a href="/">Home</a> / <a href="/guides.html">Guides</a> / Bobgrif's Titan Effects</p>
    <h1>Bobgrif's Runes Recommendations</h1>
    <p>Titan gear rune setups and recommended marches. All data provided by Bobgrif.</p>
  </section>

  <div class="container">

    <div class="tabs">
      <button class="tab-button active" onclick="openTab('loadouts')">Loadouts</button>
      <button class="tab-button" onclick="openTab('recommendations')">Recommendations</button>
    </div>
    
    <!-- Loadouts Tab -->
    <div id="loadouts" class="tab-content active">
      <br>
      <label for="marchTypeMeta">March Type:</label>
      <select id="marchTypeMeta" onchange="updateLoadoutOptions()">
        <option value="" disabled selected>Select march type</option>
      </select><br>

      <label for="loadoutName">Loadout:</label>
      <select id="loadoutName">
        <option value="" disabled selected>Select loadout</option>
      </select>
      <br>
      <div class="calculate-btn">
        <button onclick="showLoadout()">View Loadout</button>
      </div>

      <br>

      <div id="loadoutResults" class="gear-container" style="display: none;"></div>

    </div>

    <!-- Recommendations Tab -->
    <div id="recommendations" class="tab-content">
      <h2>Recommended Marches</h2>
      <p>Select your Skill Level, March Type, and Loadout to view recommended rune and Heavy Trooper combinations.</p>

      <label for="skillLevel">Skill Level:</label>
      <select id="skillLevel" onchange="updateRecMarchTypes()">
        <option value="" disabled selected>Select skill level</option>
        <option value="ES 5">ES 5</option>
        <option value="ES 7">ES 7</option>
      </select><br>

      <label for="recMarchType">March Type:</label>
      <select id="recMarchType" onchange="updateRecLoadouts()">
        <option value="" disabled selected>Select march type</option>
      </select><br>

      <label for="recLoadoutName">Loadout:</label>
      <select id="recLoadoutName">
        <option value="" disabled selected>Select loadout</option>
      </select>
      <br>
      <div class="calculate-btn">
        <button onclick="showRecommendedLoadout()">View Recommendation</button>
      </div>

      <br>

      <div id="recResults" class="gear-container" style="display: none;"></div>

    </div>

  </div>

  <script>
    let marchData = {};
let recommendedData = [];

const dataUrl = 'data/titan-gear-data2.json';

fetch(dataUrl)
  .then(res => {
    if (!res.ok) throw new Error("Data unavailable");
    return res.json();
  })
  .then(data => {
    marchData = data.marches;
    recommendedData = data.recommended || [];
    populateMarchTypeDropdown();
    populateSkillLevelDropdown();
  })
  .catch(err => {
    console.error("Failed to load data:", err.message);
    document.body.insertAdjacentHTML('afterbegin', `
      <div id="fallback-banner" style="
        background-color: #ffdddd;
        color: #900;
        padding: 10px;
        text-align: center;
        font-weight: bold;
        border-bottom: 2px solid #900;
        font-family: sans-serif;
      ">
        ⚠️ Could not load guide data. Please try refreshing the page.
      </div>
    `);
  });

// ─── Hero Portraits ───────────────────────────────────────────────────────────
// File extensions vary across assets/heroes-awakening/, so map slug → ext.
const heroPortraitExt = {
  alvida: 'jpg', heid: 'jpg', joanmature: 'jpg',
  carna: 'jpg', sara: 'png', shensuyu: 'png',
  ella: 'jpeg', franziska: 'jpeg', lilia: 'jpeg', margaretha: 'jpeg', tannis: 'jpeg',
  jett: 'jpeg', lophy: 'jpeg', nova: 'jpeg', marvingt: 'jpeg', rohr: 'jpeg',
  sinope: 'jpeg', vivian: 'jpeg'
};
// Pause portrait animations on cards outside the viewport (save CPU)
const cardObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => e.target.classList.toggle('in-view', e.isIntersecting));
}, { rootMargin: '120px' });
function observeGearBoxes() {
  document.querySelectorAll('.gear-box').forEach(b => cardObserver.observe(b));
}

// Pause all portrait animations while the tab is backgrounded
document.addEventListener('visibilitychange', () => {
  document.body.classList.toggle('anims-paused', document.hidden);
});

function heroPortrait(name) {
  const slug = (name || '').toLowerCase().replace(/\s+/g, '');
  const ext = heroPortraitExt[slug];
  if (!ext) return '';
  return `<span class="hero-portrait-wrap"><img class="hero-portrait" src="assets/heroes-awakening/${slug}_headshot.${ext}" alt="${name}" loading="lazy" onerror="this.closest('.hero-portrait-wrap').style.display='none'"></span>`;
}

// ─── Tab Switching ────────────────────────────────────────────────────────────

function openTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  event.target.classList.add('active');
}

// ─── Loadouts Tab ─────────────────────────────────────────────────────────────

// Dropdown 1: march type/meta — one option per tab in the JSON
function populateMarchTypeDropdown() {
  const select = document.getElementById('marchTypeMeta');
  select.innerHTML = '<option value="" disabled selected>Select march type</option>';

  // Display label map: JSON key → human-readable label
  const labelMap = {
    army_magnet:       'Army - Magnet',
    army_hostile:      'Army - Hostile',
    navy_splash:       'Navy - Splash',
    navy_control:      'Navy - Control',
    airforce_ignition: 'Air Force - Ignition',
    airforce_combo:    'Air Force - Combo'
  };

  Object.keys(marchData).forEach(key => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = labelMap[key] || key;
    select.appendChild(opt);
  });
}

// Dropdown 2: loadout names — populated when march type is chosen
function updateLoadoutOptions() {
  const key = document.getElementById('marchTypeMeta').value;
  const select = document.getElementById('loadoutName');
  select.innerHTML = '<option value="" disabled selected>Select loadout</option>';

  // Hide results when march type changes
  document.getElementById('loadoutResults').style.display = 'none';

  if (!key || !marchData[key]) return;

  marchData[key].forEach((loadout, index) => {
    const opt = document.createElement('option');
    opt.value = index;
    opt.textContent = loadout.march_name;
    select.appendChild(opt);
  });
}

// Render the selected loadout
function showLoadout() {
  const key = document.getElementById('marchTypeMeta').value;
  const index = document.getElementById('loadoutName').value;

  if (!key || index === '') return;

  const loadout = marchData[key][index];
  const resultsDiv = document.getElementById('loadoutResults');
  resultsDiv.style.display = '';
  resultsDiv.innerHTML = '';

  const heroes = [
    { role: 'Attack',         prefix: 'attack' },
    { role: 'Indestructible', prefix: 'indestructible' },
    { role: 'HP',             prefix: 'hp' }
  ];

  heroes.forEach(({ role, prefix }) => {
    const heroName = loadout[`${prefix}_name`];
    const gear = {
      Gun:     loadout[`${prefix}_assault_pistol`],
      Chest:   loadout[`${prefix}_tactical_backarmor`],
      Optical: loadout[`${prefix}_optical_addon`],
      Headset: loadout[`${prefix}_raysor_headset`],
      Arms:    loadout[`${prefix}_portable_gps`],
      Boots:   loadout[`${prefix}_power_boots`]
    };

    const box = document.createElement('div');
    box.className = 'gear-box';
    box.innerHTML = `
      <div class="hero-head">
        <h2>${heroName}<br><span style="font-size: 0.7em;">(${role})</span></h2>
        ${heroPortrait(heroName)}
      </div>
      <div class="gear-details">
        ${renderGearDetails(gear)}
      </div>
    `;
    resultsDiv.appendChild(box);
  });

  observeGearBoxes();
}

// ─── Recommendations Tab ──────────────────────────────────────────────────────

function populateSkillLevelDropdown() {
  // Skill level dropdown is static — values must match what's in the JSON
  // No dynamic population needed; just ensure the march type dropdown resets
  const select = document.getElementById('recMarchType');
  select.innerHTML = '<option value="" disabled selected>Select march type</option>';
  document.getElementById('recLoadoutName').innerHTML = '<option value="" disabled selected>Select loadout</option>';
}

// Dropdown 2 (rec tab): march types available for the selected skill level
function updateRecMarchTypes() {
  const skillLevel = document.getElementById('skillLevel').value;
  const select = document.getElementById('recMarchType');
  select.innerHTML = '<option value="" disabled selected>Select march type</option>';
  document.getElementById('recLoadoutName').innerHTML = '<option value="" disabled selected>Select loadout</option>';
  document.getElementById('recResults').style.display = 'none';

  if (!skillLevel) return;

  // Get unique march_type values for this skill level
  const marchTypes = [...new Set(
    recommendedData
      .filter(r => r.skill_level === skillLevel)
      .map(r => r.march_type)
  )];

  const labelMap = {
    army_magnet:       'Army - Magnet',
    army_hostile:      'Army - Hostile',
    navy_splash:       'Navy - Splash',
    navy_control:      'Navy - Control',
    airforce_ignition: 'Air Force - Ignition',
    airforce_combo:    'Air Force - Combo'
  };

  marchTypes.forEach(type => {
    const opt = document.createElement('option');
    opt.value = type;
    opt.textContent = labelMap[type] || type;
    select.appendChild(opt);
  });
}

// Dropdown 3 (rec tab): loadout names filtered by skill level + march type
function updateRecLoadouts() {
  const skillLevel = document.getElementById('skillLevel').value;
  const marchType = document.getElementById('recMarchType').value;
  const select = document.getElementById('recLoadoutName');
  select.innerHTML = '<option value="" disabled selected>Select loadout</option>';
  document.getElementById('recResults').style.display = 'none';

  if (!skillLevel || !marchType) return;

  const filtered = recommendedData.filter(
    r => r.skill_level === skillLevel && r.march_type === marchType
  );

  filtered.forEach((loadout, index) => {
    const opt = document.createElement('option');
    opt.value = index;
    opt.textContent = loadout.march_name;
    select.appendChild(opt);
  });
}

// Render the selected recommended loadout
function showRecommendedLoadout() {
  const skillLevel = document.getElementById('skillLevel').value;
  const marchType = document.getElementById('recMarchType').value;
  const index = document.getElementById('recLoadoutName').value;

  if (!skillLevel || !marchType || index === '') return;

  const filtered = recommendedData.filter(
    r => r.skill_level === skillLevel && r.march_type === marchType
  );
  const loadout = filtered[index];

  const resultsDiv = document.getElementById('recResults');
  resultsDiv.style.display = '';
  resultsDiv.innerHTML = '';

  // Hero boxes
  const heroes = [
    { role: 'Attack',         prefix: 'attack' },
    { role: 'Indestructible', prefix: 'indestructible' },
    { role: 'HP',             prefix: 'hp' }
  ];

  heroes.forEach(({ role, prefix }) => {
    const heroName = loadout[`${prefix}_name`];
    const gear = {
      Gun:     loadout[`${prefix}_assault_pistol`],
      Chest:   loadout[`${prefix}_tactical_backarmor`],
      Optical: loadout[`${prefix}_optical_addon`],
      Headset: loadout[`${prefix}_raysor_headset`],
      Arms:    loadout[`${prefix}_portable_gps`],
      Boots:   loadout[`${prefix}_power_boots`]
    };

    const box = document.createElement('div');
    box.className = 'gear-box';
    box.innerHTML = `
      <div class="hero-head">
        <h2>${heroName}<br><span style="font-size: 0.7em;">(${role})</span></h2>
        ${heroPortrait(heroName)}
      </div>
      <div class="gear-details">
        ${renderGearDetails(gear)}
      </div>
    `;
    resultsDiv.appendChild(box);
  });

  // Heavy Trooper box
  const htTrooper = loadout.heavy_trooper_type;
  const htChip    = loadout.heavy_trooper_chip_type;
  const htSlot    = loadout.heavy_trooper_placement;
  const notes     = loadout.notes;

  if (htTrooper || htChip) {
    const htIconMap = {
      "Earthshaker E-100":  "mecha_1002",
      "Blazing Gale Rx":    "mecha_1003",
      "Tide Crusher BW-3":  "mecha_1004",
      "Doom Sawblade D-4":  "mecha_1005",
      "Luminary Knight LP-4": "mecha_1006",
      "Blade Angel BA-6":   "mecha_1007"
    };

    const chipIconMap = {
      "Xyston":               "Xyston",
      "Hoplon":               "Hoplon",
      "Shamshir":             "Shamshir",
      "Estoc Piercing Sword": "Estoc",
      "Rondel Dagger":        "Rondel_Dagger",
      "Scramsax Blade":       "Scramsax_Blade",
      "Kris Sword":           "Kris_Sword",
      "Ring of Cosmos":       "Ring_of_Cosmos",
      "Sasanian's Chain":     "Sasanians_Chain"
    };

    const htKey   = htIconMap[htTrooper] || "unknown";
    const chipKey = chipIconMap[htChip]  || "unknown";

    const box = document.createElement('div');
    box.className = 'gear-box';
    box.innerHTML = `
      <h3>Heavy Trooper</h3>
      <div class="gear-grid">
        <div class="ht-slot">${htSlot}</div>
        <div class="gear-slot">
          <div class="ht-icon-row">
            <div class="ht-icon-column">
              <img class="chip-icon" src="/assets/ht-chip-icons/${chipKey.replace(/ /g, '_')}.png" alt="${htChip}" title="${htChip}" />
              <div class="chip-name">${htChip}</div>
            </div>
            <div class="ht-icon-column">
              <img class="mecha-icon" src="/assets/mecha-icons/${htKey.replace(/ /g, '_')}.png" alt="${htTrooper}" title="${htTrooper}" />
              <div class="ht-name">${htTrooper}</div>
            </div>
          </div>
        </div>
      </div>
      ${notes ? `<p class="loadout-notes"><strong>Notes:</strong> ${notes}</p>` : ''}
    `;
    resultsDiv.appendChild(box);
  }

  observeGearBoxes();
}

// ─── Shared Rendering ─────────────────────────────────────────────────────────

function renderGearDetails(gear) {
  const displayNames = {
    Gun:     'Assault Pistol',
    Chest:   'Tactical Backarmor',
    Optical: 'Optical Add-on',
    Headset: 'Raysor Headset',
    Arms:    'Portable GPS',
    Boots:   'Power Boots'
  };

  const slotOrder = [
    ['Gun',     'Headset'],
    ['Chest',   'Arms'],
    ['Optical', 'Boots']
  ];

  return `<div class="gear-grid">` + slotOrder.map(pair => {
    return pair.map(slot => {
      const rune = gear[slot];
      if (!rune) return '';
      const iconPath = `/assets/rune-icons/${rune.toLowerCase().replace(/ /g, '-')}.png`;
      return `
        <div class="gear-slot">
          <p><strong>${displayNames[slot]}</strong></p>
          <img class="rune-icon" src="${iconPath}" alt="${rune}" title="${rune}" />
          <p>${rune}</p>
        </div>
      `;
    }).join('');
  }).join('') + `</div>`;
}
  </script>

</body>

</html>
