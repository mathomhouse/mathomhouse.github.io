name: Patch Battle Report

on:
  push:
    paths:
      - 'battle-report.html'
      - 'scripts/patch-battle-report.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Apply site patches
        run: node scripts/patch-battle-report.js battle-report.html

      - name: Verify patch
        run: |
          grep -q 'br-font-fix' battle-report.html && \
          ! grep -q 'fk boats' battle-report.html || echo "PATCH_FAILED=true" >> $GITHUB_ENV

      - name: Rollback on failure
        if: env.PATCH_FAILED == 'true'
        run: |
          git checkout HEAD^ -- battle-report.html
          echo "::error::Patch verification failed — source update incompatible with patch script. Restored previous version."
          exit 1

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "132933401+kimho2@users.noreply.github.com"
          git add battle-report.html
          git diff --staged --quiet || git commit -S -m "chore: patch battle-report for mathomhouse"
          git push
