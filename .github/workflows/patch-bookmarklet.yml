name: Patch Bookmarklet

on:
  push:
    paths:
      - 'all-bookmarklet.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Apply bookmarklet patch
        run: node scripts/patch-bookmarklet.js all-bookmarklet.js

      - name: Verify patch
        run: |
          if grep -q 'Skill Dismantle wizard' all-bookmarklet.js; then
            echo "PATCH_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Rollback on failure
        if: env.PATCH_FAILED == 'true'
        run: |
          git checkout HEAD^ -- all-bookmarklet.js
          echo "::error::Patch verification failed — dismantle section still present. Restored previous version."
          exit 1

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "132933401+kimho2@users.noreply.github.com"
          git add all-bookmarklet.js
          git diff --staged --quiet || git commit -S -m "chore: patch all-bookmarklet — remove dismantle section"
          git push
