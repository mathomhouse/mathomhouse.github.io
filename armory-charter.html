<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Armory Report — Project Charter</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #388bfd;
  --orange: #e3956a; --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── Nav ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 1.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 1rem;
}
nav .title { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
.nav-controls { display: flex; align-items: center; gap: 0.75rem; }
.nav-controls button {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 0.3rem 0.8rem; border-radius: 5px;
  cursor: pointer; font-size: 0.85rem; transition: background 0.15s;
}
.nav-controls button:hover { background: var(--border); }
.nav-controls button:disabled { opacity: 0.35; cursor: default; }
.slide-counter { font-size: 0.8rem; color: var(--muted); min-width: 5ch; text-align: center; }

/* ── Slide container ── */
.deck { flex: 1; overflow: hidden; position: relative; }
.slide {
  position: absolute; inset: 0; display: none;
  flex-direction: column; justify-content: center; align-items: center;
  padding: 2.5rem 3rem; overflow-y: auto;
}
.slide.active { display: flex; }

/* ── Progress bar ── */
.progress-bar {
  height: 3px; background: var(--border); flex-shrink: 0;
}
.progress-fill {
  height: 100%; background: var(--accent); transition: width 0.3s ease;
}

/* ── Slide types ── */
.slide-inner {
  width: 100%; max-width: 900px; animation: slideIn 0.25s ease both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Title slide */
.slide-title { text-align: center; }
.slide-title .eyebrow {
  font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 1rem;
}
.slide-title h1 { font-size: 2.8rem; font-weight: 700; line-height: 1.2; }
.slide-title h1 span { color: var(--accent); }
.slide-title .subtitle { color: var(--muted); margin-top: 1rem; font-size: 1.1rem; }
.slide-title .meta { margin-top: 2rem; display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; }
.slide-title .meta-item { text-align: center; }
.slide-title .meta-item .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.slide-title .meta-item .value { font-size: 1rem; color: var(--text); margin-top: 0.2rem; }

/* Section heading */
.slide-section { text-align: center; }
.slide-section h2 { font-size: 2rem; font-weight: 700; }
.slide-section p { color: var(--muted); margin-top: 0.75rem; font-size: 1.1rem; max-width: 600px; }

/* Content slides */
.slide-content h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
.slide-content h2 .tag {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
  background: var(--card); border: 1px solid var(--border);
  padding: 0.15rem 0.5rem; border-radius: 4px; color: var(--muted);
  vertical-align: middle; margin-right: 0.6rem;
}

/* Cards / grid */
.card-grid { display: grid; gap: 1rem; }
.card-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.card-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem 1.2rem;
}
.card .card-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); margin-bottom: 0.4rem;
}
.card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
.card p { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }

.card.green  { border-left: 3px solid var(--green); }
.card.yellow { border-left: 3px solid var(--yellow); }
.card.red    { border-left: 3px solid var(--red); }
.card.blue   { border-left: 3px solid var(--blue); }
.card.accent { border-left: 3px solid var(--accent); }
.card.purple { border-left: 3px solid var(--purple); }
.card.orange { border-left: 3px solid var(--orange); }

/* Pill list */
.pill-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
.pill {
  font-size: 0.78rem; padding: 0.25rem 0.65rem;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
}
.pill.done { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
.pill.gap  { background: rgba(248,81,73,0.12); border-color: var(--red); color: var(--red); }
.pill.todo { background: rgba(210,153,34,0.12); border-color: var(--yellow); color: var(--yellow); }

/* Check/cross list */
.check-list { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; }
.check-list li { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.9rem; line-height: 1.5; }
.check-list li .icon { flex-shrink: 0; margin-top: 0.1rem; font-size: 1rem; }
.check-list li.done .icon::before { content: '✓'; color: var(--green); }
.check-list li.gap  .icon::before { content: '✗'; color: var(--red); }
.check-list li.todo .icon::before { content: '○'; color: var(--yellow); }
.check-list li.info .icon::before { content: '·'; color: var(--muted); }

/* Comparison table */
.compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.compare-table th, .compare-table td {
  padding: 0.6rem 0.8rem; text-align: left;
  border-bottom: 1px solid var(--border);
}
.compare-table th { color: var(--muted); font-weight: 600; background: var(--surface); }
.compare-table tr:last-child td { border-bottom: none; }
.compare-table td.y { color: var(--green); }
.compare-table td.n { color: var(--red); }
.compare-table td.p { color: var(--yellow); }
.compare-table .rec { background: rgba(121,192,255,0.07); }
.compare-table .rec td:first-child { border-left: 3px solid var(--accent); }

/* Timeline / roadmap */
.roadmap { display: flex; flex-direction: column; gap: 0; }
.roadmap-phase {
  display: flex; gap: 1rem;
  padding: 0.8rem 0; border-left: 2px solid var(--border);
  padding-left: 1.2rem; position: relative;
}
.roadmap-phase::before {
  content: ''; position: absolute; left: -6px; top: 50%;
  transform: translateY(-50%); width: 10px; height: 10px;
  border-radius: 50%; background: var(--border); border: 2px solid var(--bg);
}
.roadmap-phase.p1::before { background: var(--green); }
.roadmap-phase.p2::before { background: var(--yellow); }
.roadmap-phase.p3::before { background: var(--accent); }
.roadmap-phase .phase-label {
  min-width: 80px; font-size: 0.75rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em; padding-top: 0.1rem;
}
.roadmap-phase.p1 .phase-label { color: var(--green); }
.roadmap-phase.p2 .phase-label { color: var(--yellow); }
.roadmap-phase.p3 .phase-label { color: var(--accent); }
.roadmap-phase .phase-body { flex: 1; }
.roadmap-phase .phase-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.2rem; }
.roadmap-phase .phase-items { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 1rem 0; }

/* Code inline */
code {
  font-family: 'SF Mono', Consolas, monospace; font-size: 0.82em;
  background: var(--surface); border: 1px solid var(--border);
  padding: 0.1em 0.4em; border-radius: 4px; color: var(--accent);
}

/* highlight boxes */
.highlight-box {
  background: rgba(121,192,255,0.07); border: 1px solid rgba(121,192,255,0.25);
  border-radius: 8px; padding: 0.9rem 1.1rem; font-size: 0.875rem; line-height: 1.6;
}
.highlight-box.green {
  background: rgba(63,185,80,0.07); border-color: rgba(63,185,80,0.25);
}
.highlight-box.yellow {
  background: rgba(210,153,34,0.07); border-color: rgba(210,153,34,0.3);
}
.highlight-box.red {
  background: rgba(248,81,73,0.07); border-color: rgba(248,81,73,0.25);
}
.highlight-box strong { color: var(--text); }

/* two-col layout helper */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

/* persona cards */
.persona {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem;
}
.persona .persona-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.persona h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
.persona p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
.persona .needs { margin-top: 0.6rem; }
.persona .need-item {
  font-size: 0.78rem; padding: 0.15rem 0;
  border-top: 1px solid var(--border); color: var(--text);
}
.persona .need-item:first-child { border-top: none; }

/* rec badge */
.rec-badge {
  display: inline-block; font-size: 0.7rem; font-weight: 700;
  background: var(--accent); color: var(--bg);
  padding: 0.1rem 0.5rem; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.06em;
  vertical-align: middle; margin-left: 0.5rem;
}

/* small muted text */
.muted { color: var(--muted); font-size: 0.82rem; }

/* table of contents dots */
.toc-dots {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  justify-content: center; margin-top: 1rem;
}
.toc-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); cursor: pointer; transition: background 0.15s;
  border: none; padding: 0;
}
.toc-dot.active { background: var(--accent); }
.toc-dot:hover { background: var(--muted); }

/* Keyboard hint */
.key-hint {
  position: fixed; bottom: 1rem; right: 1rem;
  font-size: 0.72rem; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.35rem 0.65rem;
}
</style>
</head>
<body>

<nav>
  <span class="title">Armory Report — mathomhouse.github.io</span>

<div class="deck" id="deck"></div>

// ── Render engine ─────────────────────────────────────────────────────────────
const deck = document.getElementById('deck');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const counter = document.getElementById('counter');
const progress = document.getElementById('progress');

let current = 0;

function buildDeck() {
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide' + (i === 0 ? ' active' : '');
    el.dataset.index = i;
    el.innerHTML = s.html;
    deck.appendChild(el);
  });
  buildDots();
  updateNav();
}

function buildDots() {
  const nav = document.querySelector('.nav-controls');
  const dots = document.createElement('div');
  dots.className = 'toc-dots';
  dots.style.display = 'none'; // shown on request
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'toc-dot' + (i === 0 ? ' active' : '');
    d.title = slides[i].id;
    d.addEventListener('click', () => goTo(i));
    dots.appendChild(d);
  });
  // insert into nav
  const navEl = document.querySelector('nav');
  navEl.insertBefore(dots, navEl.querySelector('.nav-controls'));
  dots.style.display = 'flex';
}

function updateDots() {
  document.querySelectorAll('.toc-dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function goTo(n) {
  document.querySelectorAll('.slide')[current].classList.remove('active');
  current = Math.max(0, Math.min(n, slides.length - 1));
  document.querySelectorAll('.slide')[current].classList.add('active');
  updateNav();
  updateDots();
}

function updateNav() {
  counter.textContent = `${current + 1} / ${slides.length}`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === slides.length - 1;
  progress.style.width = `${((current + 1) / slides.length) * 100}%`;
}

btnPrev.addEventListener('click', () => goTo(current - 1));
btnNext.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    e.preventDefault(); goTo(current + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault(); goTo(current - 1);
  }
});

buildDeck();
</script>
