<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Armory Report — Project Charter</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #388bfd;
  --orange: #e3956a; --purple: #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 1.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 1rem;
  flex-wrap: wrap;
}
nav .title { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
.nav-right { display: flex; align-items: center; gap: 0.75rem; }
.nav-right button {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 0.3rem 0.8rem; border-radius: 5px;
  cursor: pointer; font-size: 0.85rem; transition: background 0.15s;
}
.nav-right button:hover { background: var(--border); }
.nav-right button:disabled { opacity: 0.35; cursor: default; }
.slide-counter { font-size: 0.8rem; color: var(--muted); min-width: 5ch; text-align: center; }

.toc-dots { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
.toc-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); cursor: pointer;
  border: none; padding: 0; flex-shrink: 0;
  transition: background 0.15s;
}
.toc-dot.active { background: var(--accent); }
.toc-dot:hover { background: var(--muted); }

.progress-bar { height: 3px; background: var(--border); flex-shrink: 0; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

.deck { flex: 1; overflow: hidden; position: relative; }
.slide {
  position: absolute; inset: 0; display: none;
  flex-direction: column; justify-content: center; align-items: center;
  padding: 2rem 3rem; overflow-y: auto;
}
.slide.active { display: flex; }

.slide-inner {
  width: 100%; max-width: 900px;
  animation: fadeUp 0.2s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Title slide ── */
.s-title { text-align: center; }
.s-title .eyebrow {
  font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 1rem;
}
.s-title h1 { font-size: 2.6rem; font-weight: 700; line-height: 1.2; }
.s-title h1 em { font-style: normal; color: var(--accent); }
.s-title .sub { color: var(--muted); margin-top: 0.9rem; font-size: 1.05rem; line-height: 1.6; }
.s-title .meta {
  margin-top: 2rem; display: flex; gap: 2rem;
  justify-content: center; flex-wrap: wrap;
}
.meta-item .lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.meta-item .val { font-size: 0.95rem; margin-top: 0.15rem; }

/* ── Content slides ── */
.s-content h2 {
  font-size: 1.45rem; font-weight: 700; margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.tag {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
  background: var(--card); border: 1px solid var(--border);
  padding: 0.15rem 0.5rem; border-radius: 4px; color: var(--muted);
  white-space: nowrap;
}

/* ── Grid ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

/* ── Card ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem 1.1rem;
}
.card .clabel {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); margin-bottom: 0.35rem;
}
.card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.35rem; }
.card p { font-size: 0.845rem; color: var(--muted); line-height: 1.55; }
.card.c-green  { border-left: 3px solid var(--green); }
.card.c-yellow { border-left: 3px solid var(--yellow); }
.card.c-red    { border-left: 3px solid var(--red); }
.card.c-blue   { border-left: 3px solid var(--blue); }
.card.c-accent { border-left: 3px solid var(--accent); }
.card.c-purple { border-left: 3px solid var(--purple); }
.card.c-orange { border-left: 3px solid var(--orange); }

/* ── Check list ── */
.cl { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
.cl li { display: flex; align-items: flex-start; gap: 0.55rem; font-size: 0.875rem; line-height: 1.5; }
.cl li .ic { flex-shrink: 0; width: 1em; margin-top: 0.05rem; }
.cl li.done .ic::before { content: '✓'; color: var(--green); }
.cl li.gap  .ic::before { content: '✗'; color: var(--red); }
.cl li.todo .ic::before { content: '○'; color: var(--yellow); }
.cl li.info .ic::before { content: '·'; color: var(--muted); font-size: 1.2em; }

/* ── Table ── */
.ct { width: 100%; border-collapse: collapse; font-size: 0.845rem; }
.ct th, .ct td { padding: 0.55rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
.ct th { color: var(--muted); font-weight: 600; background: var(--surface); }
.ct tr:last-child td { border-bottom: none; }
.ct .y { color: var(--green); }
.ct .n { color: var(--red); }
.ct .p { color: var(--yellow); }
.ct tr.rec td:first-child { border-left: 3px solid var(--accent); }
.ct tr.rec { background: rgba(121,192,255,0.05); }

/* ── Highlight box ── */
.hbox {
  border-radius: 8px; padding: 0.85rem 1rem;
  font-size: 0.875rem; line-height: 1.6;
}
.hbox.h-blue   { background: rgba(121,192,255,0.07); border: 1px solid rgba(121,192,255,0.25); }
.hbox.h-green  { background: rgba(63,185,80,0.07);   border: 1px solid rgba(63,185,80,0.25); }
.hbox.h-yellow { background: rgba(210,153,34,0.07);  border: 1px solid rgba(210,153,34,0.3); }
.hbox.h-red    { background: rgba(248,81,73,0.07);   border: 1px solid rgba(248,81,73,0.25); }
.hbox strong { color: var(--text); }

/* ── Persona ── */
.persona {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1rem;
}
.persona .pico { font-size: 1.8rem; margin-bottom: 0.4rem; }
.persona h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
.persona p  { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.6rem; }
.persona .ni { font-size: 0.8rem; padding: 0.2rem 0; border-top: 1px solid var(--border); }

/* ── Roadmap ── */
.roadmap { display: flex; flex-direction: column; }
.rp {
  display: flex; gap: 1rem; padding: 0.75rem 0 0.75rem 1.2rem;
  border-left: 2px solid var(--border); position: relative;
}
.rp::before {
  content: ''; position: absolute; left: -6px; top: 50%;
  transform: translateY(-50%); width: 10px; height: 10px;
  border-radius: 50%; background: var(--border);
}
.rp.p1::before { background: var(--green); }
.rp.p2::before { background: var(--yellow); }
.rp.p3::before { background: var(--accent); }
.rp .plabel { min-width: 80px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding-top: 0.1rem; }
.rp.p1 .plabel { color: var(--green); }
.rp.p2 .plabel { color: var(--yellow); }
.rp.p3 .plabel { color: var(--accent); }
.rp .ptitle { font-size: 0.92rem; font-weight: 600; margin-bottom: 0.2rem; }
.rp .pitems { font-size: 0.8rem; color: var(--muted); line-height: 1.65; }

/* ── Badge ── */
.badge {
  display: inline-block; font-size: 0.65rem; font-weight: 700;
  background: var(--accent); color: var(--bg);
  padding: 0.1rem 0.45rem; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.06em;
  vertical-align: middle; margin-left: 0.4rem;
}

code {
  font-family: 'SF Mono', Consolas, monospace; font-size: 0.82em;
  background: var(--surface); border: 1px solid var(--border);
  padding: 0.1em 0.35em; border-radius: 3px; color: var(--accent);
}
.muted { color: var(--muted); font-size: 0.845rem; }

.key-hint {
  position: fixed; bottom: 0.75rem; right: 1rem;
  font-size: 0.7rem; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 5px; padding: 0.3rem 0.6rem; pointer-events: none;
}
</style>
</head>
<body>

<nav>
  <span class="title">Armory Report — mathomhouse.github.io &nbsp;|&nbsp; Project Charter</span>
  <div id="dots" class="toc-dots"></div>
  <div class="nav-right">
    <button id="prev" disabled>← Prev</button>
    <span class="slide-counter" id="ctr"></span>
    <button id="next">Next →</button>
  </div>
</nav>
<div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
<div class="deck" id="deck"></div>
<div class="key-hint">← → to navigate</div>

<script>
const SLIDES = [

/* 1 ── TITLE */
`<div class="slide-inner s-title">
  <div class="eyebrow">Project Charter · May 2026</div>
  <h1>Armory Report on<br><em>Mathomhouse</em></h1>
  <p class="sub">Porting player armory reports, share links, advisory plans,<br>and cross-device identity to a static GitHub Pages site.</p>
  <div class="meta">
    <div class="meta-item"><div class="lbl">Site</div><div class="val">mathomhouse.github.io</div></div>
    <div class="meta-item"><div class="lbl">Backend</div><div class="val">Cloudflare Workers + KV</div></div>
    <div class="meta-item"><div class="lbl">Current auth</div><div class="val">Random siteKey + Recovery Code</div></div>
    <div class="meta-item"><div class="lbl">Status</div><div class="val">Feature planning</div></div>
  </div>
</div>`,

/* 2 ── WHAT WE'RE BUILDING */
`<div class="slide-inner s-content">
  <h2><span class="tag">Overview</span> What We're Building</h2>
  <div class="g2">
    <div class="card c-accent">
      <div class="clabel">Core feature</div>
      <h3>Armory Report</h3>
      <p>Player's full gear, formation, and troop-power snapshot. Data pulled from Top War game API via bookmarklet. Currently live on <code>2864tw.com</code> — porting to Mathomhouse.</p>
    </div>
    <div class="card c-blue">
      <div class="clabel">Sharing</div>
      <h3>Share Links (4-char code)</h3>
      <p>Player generates a public-view link. Anyone with the code can view that snapshot. No auth required for the viewer.</p>
    </div>
    <div class="card c-purple">
      <div class="clabel">Advisor access</div>
      <h3>Advisory Links (6-char code)</h3>
      <p>Player grants a named advisor read access to their live report. Advisor leaves a structured plan. Player sees the advisor's name next to the plan.</p>
    </div>
    <div class="card c-green">
      <div class="clabel">Cross-device</div>
      <h3>Profile Continuity</h3>
      <p>Player should access their own report on any device without re-running the bookmarklet and without needing any share or advisory link.</p>
    </div>
  </div>
</div>`,

/* 3 ── CONSTRAINTS */
`<div class="slide-inner s-content">
  <h2><span class="tag">Constraints</span> What We're Working With</h2>
  <div class="g2">
    <div>
      <div class="card" style="margin-bottom:0.8rem">
        <div class="clabel">Infrastructure</div>
        <ul class="cl">
          <li class="done"><span class="ic"></span>Static GitHub Pages — no server-side rendering</li>
          <li class="done"><span class="ic"></span>Cloudflare Workers + KV for all stateful ops</li>
          <li class="done"><span class="ic"></span>CORS locked to <code>mathomhouse.github.io</code></li>
          <li class="done"><span class="ic"></span>Game data pulled via bookmarklet only (client-side)</li>
        </ul>
      </div>
      <div class="card c-yellow">
        <div class="clabel">The stateless challenge</div>
        <p>The site cannot set cookies, manage sessions, or run server logic. Any "session" is a token in <code>localStorage</code> + a KV lookup. All "auth" is just ownership of a secret key.</p>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:0.8rem">
        <div class="clabel">Player expectations</div>
        <ul class="cl">
          <li class="info"><span class="ic"></span>Mobile-game audience — low tech friction tolerance</li>
          <li class="info"><span class="ic"></span>Many players use multiple devices (phone + PC)</li>
          <li class="info"><span class="ic"></span>No one wants another username + password</li>
          <li class="info"><span class="ic"></span>Discord is already universal identity in gaming</li>
          <li class="info"><span class="ic"></span>Players share tips in alliance chats, not email</li>
        </ul>
      </div>
      <div class="card">
        <div class="clabel">Existing source</div>
        <p>The upstream <code>armory-report.html</code> has its own identity system built for the S2864 community. We patch it with <code>armory-auth-override.js</code> and must stay compatible with that structure.</p>
      </div>
    </div>
  </div>
</div>`,

/* 4 ── PERSONAS */
`<div class="slide-inner s-content">
  <h2><span class="tag">Users</span> Who Uses This</h2>
  <div class="g3" style="margin-bottom:1rem">
    <div class="persona">
      <div class="pico">🪖</div>
      <h3>The Player</h3>
      <p>Wants to know how their gear and troops measure up. Runs bookmarklet once. Might share with an alliance mate for advice.</p>
      <div class="ni">✓ Generate report easily</div>
      <div class="ni">✓ View it on any device</div>
      <div class="ni">✓ Share with someone they trust</div>
      <div class="ni" style="color:var(--red)">✗ Does NOT want to sign up</div>
    </div>
    <div class="persona">
      <div class="pico">🔗</div>
      <h3>The Viewer</h3>
      <p>Friend or alliance mate with a share link. Just wants to see the stats. Zero interest in creating an account.</p>
      <div class="ni">✓ Open link, see report</div>
      <div class="ni" style="color:var(--red)">✗ No account or login</div>
      <div class="ni" style="color:var(--red)">✗ Can't access without link</div>
    </div>
    <div class="persona">
      <div class="pico">🎖️</div>
      <h3>The Advisor</h3>
      <p>Experienced player who guides others. Reviews a player's full report, leaves an actionable plan. Expects their name on the plan.</p>
      <div class="ni">✓ Load advisory link</div>
      <div class="ni">✓ View full live report</div>
      <div class="ni">✓ Leave a named plan</div>
      <div class="ni">✓ Persistent identity / display name</div>
    </div>
  </div>
  <div class="hbox h-blue">
    <strong>Key insight:</strong> Only advisors need a persistent, named identity. Players and viewers need zero friction — no accounts, no logins.
  </div>
</div>`,

/* 5 ── CURRENT STATE */
`<div class="slide-inner s-content">
  <h2><span class="tag">Current State</span> What's Already Built</h2>
  <div class="g2">
    <div class="card c-green">
      <div class="clabel">Done ✓</div>
      <ul class="cl">
        <li class="done"><span class="ic"></span>Random <code>siteKey</code> (16-char hex) — generated locally, no login</li>
        <li class="done"><span class="ic"></span>HMAC token proves siteKey ownership to worker (no password)</li>
        <li class="done"><span class="ic"></span>4-char share codes stored in KV, 7-day TTL</li>
        <li class="done"><span class="ic"></span>12-char recovery code → restores siteKey on new device</li>
        <li class="done"><span class="ic"></span>Export / Import JSON → manual full-profile transfer</li>
        <li class="done"><span class="ic"></span>Supplement data (gear, bench, chips…) stored per-siteKey in KV</li>
        <li class="done"><span class="ic"></span>Per-kind privacy flags — can hide individual sections</li>
      </ul>
    </div>
    <div class="card c-red">
      <div class="clabel">Not yet built ✗</div>
      <ul class="cl">
        <li class="gap"><span class="ic"></span>6-char advisory links — stubbed, returns 404 / 503</li>
        <li class="gap"><span class="ic"></span>Advisor identity — no concept of named advisors</li>
        <li class="gap"><span class="ic"></span>Advisor plan creation + display</li>
        <li class="gap"><span class="ic"></span>Cross-device: recovery restores identity only — supplement data lost, must re-run bookmarklet</li>
        <li class="gap"><span class="ic"></span>Report privacy: supplement GET requires no auth — anyone who knows a <code>siteKey</code> can read data</li>
      </ul>
    </div>
  </div>
</div>`,

/* 6 ── GAPS */
`<div class="slide-inner s-content">
  <h2><span class="tag">Gaps</span> What Needs to Be Solved</h2>
  <div class="g2">
    <div class="card c-red">
      <div class="clabel">Gap 1 — Privacy</div>
      <h3>Supplement data is open by default</h3>
      <p>Worker's <code>GET /supplement/:kind/:siteKey</code> has no auth check. Anyone who discovers a <code>siteKey</code> can read that player's data. Privacy flags exist but default to off — should be private by default, unlocked by shortcode.</p>
    </div>
    <div class="card c-yellow">
      <div class="clabel">Gap 2 — Cross-device</div>
      <h3>Recovery only restores identity</h3>
      <p>The 12-char recovery code restores the <code>siteKey</code> — but NOT supplement data stored in KV. Player still needs to re-run the bookmarklet or use Export/Import. New device = empty report.</p>
    </div>
    <div class="card c-purple">
      <div class="clabel">Gap 3 — Advisory system</div>
      <h3>6-char codes not implemented</h3>
      <p>Advisory links completely stubbed in <code>armory-auth-override.js</code>. Worker has no <code>/advisor/</code> routes. No advisor role, no plan storage, no named attribution.</p>
    </div>
    <div class="card c-orange">
      <div class="clabel">Gap 4 — Advisor identity</div>
      <h3>No way for advisor to have a name</h3>
      <p>When advisor creates a plan, player should see "Plan by <strong>YourName</strong>" — but there's no persistent named identity for advisors. Requires some form of verifiable display name.</p>
    </div>
  </div>
</div>`,

/* 7 ── PLAYER AUTH OPTIONS */
`<div class="slide-inner s-content">
  <h2><span class="tag">Identity</span> Player Auth — Options</h2>
  <p class="muted" style="margin-bottom:0.9rem">Goal: player sees their full report on any device, no re-import, no links needed.</p>
  <table class="ct">
    <thead><tr><th>Option</th><th>Cross-device</th><th>Friction</th><th>Notes</th></tr></thead>
    <tbody>
      <tr><td><strong>A — Export / Import JSON</strong></td><td class="p">Manual</td><td class="p">Medium</td><td class="muted">File transfer awkward on mobile</td></tr>
      <tr><td><strong>B — Recovery code (current)</strong></td><td class="p">Identity only</td><td class="y">Low</td><td class="muted">Doesn't restore supplement data</td></tr>
      <tr class="rec"><td><strong>C — Enhanced recovery</strong> <span class="badge">Recommended</span></td><td class="y">Full</td><td class="y">Low</td><td class="muted">Recovery also backs up + restores KV data</td></tr>
      <tr><td><strong>D — Passphrase KV</strong></td><td class="y">Full</td><td class="p">Medium</td><td class="muted">Extra step, no meaningful security gain</td></tr>
      <tr><td><strong>E — OAuth (Google / Discord)</strong></td><td class="y">Full</td><td class="n">High</td><td class="muted">Overkill for players who just want a report</td></tr>
    </tbody>
  </table>
  <div class="hbox h-green" style="margin-top:0.9rem">
    <strong>Option C detail:</strong> When player hits "Get recovery code," worker also snapshots their supplement data under that code. On restore, it fetches everything back — full report immediately, no bookmarklet re-run needed.
  </div>
</div>`,

/* 8 ── ADVISOR AUTH OPTIONS */
`<div class="slide-inner s-content">
  <h2><span class="tag">Plan A — Identity</span> Advisor Auth — Options</h2>
  <p class="muted" style="margin-bottom:0.9rem">Goal: advisor has a persistent display name that appears on plans. Player must be able to trust the name shown.</p>
  <table class="ct">
    <thead><tr><th>Option</th><th>Name verified</th><th>Friction</th><th>Notes</th></tr></thead>
    <tbody>
      <tr><td><strong>A — Claimed display name</strong></td><td class="n">No</td><td class="y">Zero</td><td class="muted">Name squatting, impersonation possible</td></tr>
      <tr class="rec"><td><strong>B — Discord OAuth</strong> <span class="badge">Recommended</span></td><td class="y">Yes</td><td class="y">Low</td><td class="muted">One-click; already in players' pockets</td></tr>
      <tr><td><strong>C — Email magic link</strong></td><td class="y">Yes</td><td class="p">Medium</td><td class="muted">Familiar but slower; needs email provider</td></tr>
      <tr><td><strong>D — GitHub OAuth</strong></td><td class="y">Yes</td><td class="p">Medium</td><td class="muted">Not universal for this audience</td></tr>
      <tr><td><strong>E — Same siteKey system, self-reported name</strong></td><td class="n">No</td><td class="y">Zero</td><td class="muted">Unverified — anyone could claim any name</td></tr>
    </tbody>
  </table>
  <div class="hbox h-blue" style="margin-top:0.9rem">
    <strong>Option B detail:</strong> Advisor clicks "Sign in as Advisor" → Discord OAuth → worker receives Discord user ID + display name → stored as advisor profile in KV. Worker handles OAuth callback. Static site compatible.
  </div>
</div>`,

/* 9 ── ADVISORY FLOW */
`<div class="slide-inner s-content">
  <h2><span class="tag">Plan A — Feature Design</span> Advisory Link Flow</h2>
  <div class="g2">
    <div>
      <div class="card c-accent" style="margin-bottom:0.8rem">
        <div class="clabel">Step 1 — Player</div>
        <h3>Generate advisory link</h3>
        <p>Player clicks "Create Advisory Link." Worker generates 6-char code (e.g. <code>XK9P4R</code>) tied to player's <code>siteKey</code>. Player shares code with their advisor via Discord or alliance chat.</p>
      </div>
      <div class="card c-purple" style="margin-bottom:0.8rem">
        <div class="clabel">Step 2 — Advisor</div>
        <h3>Load the advisory link</h3>

// ── Engine ────────────────────────────────────────────────────────────────────
const deck  = document.getElementById('deck');
const prev  = document.getElementById('prev');
const next  = document.getElementById('next');
const ctr   = document.getElementById('ctr');
const prog  = document.getElementById('prog');
const dotsC = document.getElementById('dots');
let cur = 0;

// Build slides
SLIDES.forEach((html, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' active' : '');
  el.innerHTML = html;
  deck.appendChild(el);
});

// Build dots
SLIDES.forEach((_, i) => {
  const d = document.createElement('button');
  d.className = 'toc-dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => go(i));
  dotsC.appendChild(d);
});

function go(n) {
  n = Math.max(0, Math.min(n, SLIDES.length - 1));
  document.querySelectorAll('.slide')[cur].classList.remove('active');
  document.querySelectorAll('.toc-dot')[cur].classList.remove('active');
  cur = n;
  document.querySelectorAll('.slide')[cur].classList.add('active');
  document.querySelectorAll('.toc-dot')[cur].classList.add('active');
  prev.disabled = cur === 0;
  next.disabled = cur === SLIDES.length - 1;
  ctr.textContent = `${cur + 1} / ${SLIDES.length}`;
  prog.style.width = `${((cur + 1) / SLIDES.length) * 100}%`;
}

prev.addEventListener('click', () => go(cur - 1));
next.addEventListener('click', () => go(cur + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); go(cur + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); go(cur - 1); }
});

go(0);
</script>
