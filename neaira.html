<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Valuation Wheel — Mathom House</title>
    <!-- Anti-flash -->
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/mathomhouse.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/calculators.css">
    <script src="header.js" defer></script>
    <link rel="icon" href="/cutelogo.ico" type="image/x-icon">
    
    <style>
        /* Fixes the flex layout bug by letting the body flow naturally */
        body {
            margin: 0;
            padding: 0;
        }

        /* Dedicated layout wrapper to cleanly stack and center content */
        .wheel-page-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 40px;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px 0;
        }

        /* The Spinner Arrow */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--red); /* Using system design token */
            z-index: 10;
        }

        /* The Visual Wheel */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--border); /* Using system design token */
            background: conic-gradient(
                #ff6b6b 0deg 60deg, 
                #4bcff6 60deg 120deg, 
                #1dd1a1 120deg 180deg, 
                #feca57 180deg 240deg, 
                #5f27cd 240deg 300deg, 
                #00d2d3 300deg 360deg
            );
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Center pin */
        .wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background-color: var(--surface); /* Match site theme */
            border: 2px solid var(--border);
            border-radius: 50%;
        }

        .result {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 36px;
            font-family: 'Rajdhani', sans-serif;
        }
    </style>
</head>

<body>
    <header id="header-placeholder"></header>

    <!-- Wrapped inside a standard system container to enforce layout consistency -->
    <div class="container">
        <div class="wheel-page-center">
            <h1>Official Account Value Calculator</h1>
            <p class="calc-desc">Calculate your exact, mathematically verified market value down to the penny.</p>
            
            <div class="wheel-container">
                <div class="arrow"></div>
                <div class="wheel" id="wheel"></div>
            </div>

            <button id="spinBtn" class="calc-btn" onclick="spinWheel()">Spin for Value!</button>

            <div class="result" id="resultDisplay"></div>
        </div>
    </div>

    <script>
        let currentRotation = 0;
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const resultDisplay = document.getElementById('resultDisplay');

        // The pool of insult/joke prizes
        const jokePrizes = [
            "One half-eaten taco",
            "$0.03",
            "A single base skin voucher",
            "Negative $4.50 (You owe us money for hosting this)",
            "A firm handshake from an R1",
            "3 Pennies and a piece of lint",
            "Pocket change found under the seat"
        ];

        // Comedic loading steps that swap out while spinning
        const loadingPhrases = [
            "Scanning Armory builds...",
            "Evaluating component logic...",
            "Checking hero layout parameters...",
            "Laughing at your server rank...",
            "Calculating precise emotional damage...",
            "Finalizing appraisal..."
        ];

        function spinWheel() {
            // Disable button and clear previous results
            spinBtn.disabled = true;
            
            // Cycle through loading phrases while spinning to build tension
            let phraseIndex = 0;
            resultDisplay.innerText = loadingPhrases[phraseIndex];
            
            const phraseInterval = setInterval(() => {
                phraseIndex++;
                if (phraseIndex < loadingPhrases.length) {
                    resultDisplay.innerText = loadingPhrases[phraseIndex];
                }
            }, 650); // Shifts text slightly faster than once every half second

            // Calculate the result immediately, but don't show it yet
            let finalOutput = "";
            const isJoke = Math.random() < 0.15; // 15% probability

            if (isJoke) {
                const randomJoke = jokePrizes[Math.floor(Math.random() * jokePrizes.length)];
                finalOutput = `Your account is worth: <span style="color: var(--red); font-weight: bold;">${randomJoke}</span>`;
            } else {
                // Regular math estimation ($1 to $10,000)
                const randomPrize = (Math.random() * (10000 - 1) + 1).toFixed(2);
                finalOutput = `Your account value is officially: <span class="gold-text">$${parseFloat(randomPrize).toLocaleString()}</span>`;
            }

            // Spin the wheel visually (at least 4 full rotations + random offset)
            const extraDegrees = Math.floor(Math.random() * 360);
            currentRotation += 1440 + extraDegrees; 
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Reveal the outcome when the 4-second animation stops
            setTimeout(() => {
                clearInterval(phraseInterval);
                resultDisplay.innerHTML = finalOutput;
                spinBtn.disabled = false;
            }, 4000);
        }
    </script>
